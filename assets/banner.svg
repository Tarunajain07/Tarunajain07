<svg xmlns="http://www.w3.org/2000/svg"
     width="1600"
     height="500"
     viewBox="0 0 1600 500">

  <!-- Background -->
  <rect width="1600" height="500" fill="#0d0d0d"/>

  <!-- Stars -->
  <circle cx="180" cy="70" r="2" fill="white">
    <animate attributeName="opacity"
             values="0.2;1;0.2"
             dur="2s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="450" cy="90" r="2" fill="white">
    <animate attributeName="opacity"
             values="1;0.2;1"
             dur="3s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="900" cy="60" r="2" fill="white">
    <animate attributeName="opacity"
             values="0.3;1;0.3"
             dur="2.5s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="1300" cy="120" r="2" fill="white">
    <animate attributeName="opacity"
             values="1;0.2;1"
             dur="4s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Moon -->
  <circle cx="260" cy="110" r="45" fill="#f4f4f4"/>
  <circle cx="278" cy="100" r="40" fill="#0d0d0d"/>

  <!-- Name -->
  <text x="800"
        y="250"
        text-anchor="middle"
        fill="white"
        font-size="64"
        font-family="monospace"
        font-weight="bold">
    TARUNA JAIN
  </text>

  <!-- Subtitle -->
  <text x="800"
        y="310"
        text-anchor="middle"
        fill="#aaaaaa"
        font-size="24"
        font-family="Arial">
    B.Tech Cybersecurity Student
  </text>

</svg>
